<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>背景移除工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 900px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 2rem;
    }
    .upload-area {
      border: 3px dashed #667eea;
      border-radius: 15px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
    }
    .upload-area:hover { background: #f8f9ff; }
    .upload-area.dragover { background: #e8ebff; border-color: #4c5fd5; }
    #fileInput { display: none; }
    .btn {
      display: inline-block;
      padding: 12px 30px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s;
    }
    .btn:hover { background: #5568d3; transform: scale(1.05); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .images {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 30px;
    }
    .image-box {
      text-align: center;
    }
    .image-box h3 {
      margin-bottom: 10px;
      color: #555;
    }
    .image-box img {
      max-width: 100%;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .download-btn {
      margin-top: 10px;
      background: #4CAF50;
    }
    .loading {
      text-align: center;
      color: #667eea;
      font-size: 1.1rem;
      margin: 20px 0;
    }
    @media (max-width: 768px) {
      .images { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖼️ 背景移除工具</h1>
    
    <div class="upload-area" id="uploadArea">
      <p>📁 点击或拖拽图片到这里</p>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    
    <div style="text-align: center;">
      <button class="btn" id="processBtn" disabled>移除背景</button>
    </div>
    
    <div class="loading" id="loading" style="display: none;">处理中...</div>
    
    <div class="images" id="imagesContainer" style="display: none;">
      <div class="image-box">
        <h3>原图</h3>
        <img id="originalImg" alt="原图">
      </div>
      <div class="image-box">
        <h3>处理后</h3>
        <img id="resultImg" alt="处理后">
        <br>
        <button class="btn download-btn" id="downloadBtn">下载图片</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'YOUR_WORKER_URL/remove-bg';
    
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const loading = document.getElementById('loading');
    const imagesContainer = document.getElementById('imagesContainer');
    const originalImg = document.getElementById('originalImg');
    const resultImg = document.getElementById('resultImg');
    const downloadBtn = document.getElementById('downloadBtn');
    
    let selectedFile = null;
    
    uploadArea.addEventListener('click', () => fileInput.click());
    
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });
    
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        handleFile(file);
      }
    });
    
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleFile(file);
    });
    
    function handleFile(file) {
      selectedFile = file;
      originalImg.src = URL.createObjectURL(file);
      processBtn.disabled = false;
      imagesContainer.style.display = 'none';
    }
    
    processBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      
      loading.style.display = 'block';
      processBtn.disabled = true;
      
      const formData = new FormData();
      formData.append('image', selectedFile);
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: formData
        });
        
        if (!response.ok) throw new Error('处理失败');
        
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        
        resultImg.src = url;
        imagesContainer.style.display = 'grid';
        
        downloadBtn.onclick = () => {
          const a = document.createElement('a');
          a.href = url;
          a.download = 'removed-bg.png';
          a.click();
        };
      } catch (error) {
        alert('处理失败: ' + error.message);
      } finally {
        loading.style.display = 'none';
        processBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
